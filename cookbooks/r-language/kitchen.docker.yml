---
driver:
  name: dokken
  privileged: true
  chef_version: 18

transport:
  name: dokken

provisioner:
  name: dokken
  deprecations_as_errors: true
  chef_license: accept-silent

verifier:
  name: inspec

platforms:
  - name: ubuntu-22.04
    driver:
      image: dokken/ubuntu-22.04
      pid_one_command: /bin/systemd
  - name: debian-11
    driver:
      image: dokken/debian-11
      pid_one_command: /bin/systemd
  - name: rockylinux-8
    driver:
      image: dokken/rockylinux-8
      pid_one_command: /usr/lib/systemd/systemd
  - name: amazonlinux-2
    driver:
      image: dokken/amazonlinux-2
      pid_one_command: /usr/lib/systemd/systemd

suites:
  - name: default
    run_list:
      - recipe[r-language::default]
    verifier:
      inspec_tests:
        - test/integration/default
    attributes:
      r-language:
        packages:
          - ggplot2
          - dplyr
  - name: source
    run_list:
      - recipe[r-language::default]
    verifier:
      inspec_tests:
        - test/integration/source
    attributes:
      r-language:
        installation_method: source
        version: "4.3.0"
