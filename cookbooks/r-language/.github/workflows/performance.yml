name: Performance Testing

on:
  push:
    branches: [main, master]
    paths:
      - "recipes/**"
      - "resources/**"
      - "libraries/**"
  pull_request:
    branches: [main, master]
    paths:
      - "recipes/**"
      - "resources/**"
      - "libraries/**"
  schedule:
    - cron: "0 2 * * 0" # Weekly on Sunday at 2 AM UTC

# Cancel previous runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}



# Minimal permissions by default
permissions:
  contents: read

jobs:
  performance-benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Prevent hung jobs
    strategy:
      matrix:
        scenario: ["default", "packages"]
        platform: ["ubuntu-2204"]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Install Chef
        uses: actionshub/chef-install@main
        with:
          channel: stable
          version: latest

      - name: Benchmark Chef Run Time
        run: |
          export CHEF_LICENSE=accept-no-persist
          echo "Starting performance benchmark for ${{ matrix.scenario }}-${{ matrix.platform }}"

          # Create and converge instance with timing
          START_TIME=$(date +%s)
          bundle exec kitchen create ${{ matrix.scenario }}-${{ matrix.platform }}
          CREATE_TIME=$(date +%s)

          bundle exec kitchen converge ${{ matrix.scenario }}-${{ matrix.platform }}
          CONVERGE_TIME=$(date +%s)

          bundle exec kitchen verify ${{ matrix.scenario }}-${{ matrix.platform }}
          VERIFY_TIME=$(date +%s)

          # Calculate durations
          CREATE_DURATION=$((CREATE_TIME - START_TIME))
          CONVERGE_DURATION=$((CONVERGE_TIME - CREATE_TIME))
          VERIFY_DURATION=$((VERIFY_TIME - CONVERGE_TIME))
          TOTAL_DURATION=$((VERIFY_TIME - START_TIME))

          echo "Performance Results for ${{ matrix.scenario }}-${{ matrix.platform }}:"
          echo "- Create: ${CREATE_DURATION}s"
          echo "- Converge: ${CONVERGE_DURATION}s"
          echo "- Verify: ${VERIFY_DURATION}s"
          echo "- Total: ${TOTAL_DURATION}s"

          # Save results
          mkdir -p performance-results
          cat > performance-results/${{ matrix.scenario }}-${{ matrix.platform }}.json << EOF
          {
            "scenario": "${{ matrix.scenario }}",
            "platform": "${{ matrix.platform }}",
            "create_duration": ${CREATE_DURATION},
            "converge_duration": ${CONVERGE_DURATION},
            "verify_duration": ${VERIFY_DURATION},
            "total_duration": ${TOTAL_DURATION},
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_YAML: kitchen.yml

      - name: Test R Package Installation Performance
        if: matrix.scenario == 'packages'
        run: |
          export CHEF_LICENSE=accept-no-persist

          # Test individual package installation timing
          echo "Testing R package installation performance..."
          bundle exec kitchen exec ${{ matrix.scenario }}-${{ matrix.platform }} -c "
            time Rscript -e 'install.packages(\"data.table\", repos=\"https://cloud.r-project.org\", quiet=TRUE)'
            time Rscript -e 'install.packages(\"jsonlite\", repos=\"https://cloud.r-project.org\", quiet=TRUE)'
          "
        env:
          CHEF_LICENSE: accept-no-persist

      - name: Upload Performance Results
        uses: actions/upload-artifact@v5
        with:
          name: performance-results-${{ matrix.scenario }}-${{ matrix.platform }}
          path: performance-results/
          retention-days: 30

      - name: Cleanup
        if: always()
        run: |
          bundle exec kitchen destroy ${{ matrix.scenario }}-${{ matrix.platform }} || true

  resource-usage:
    name: Resource Usage Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Prevent hung jobs
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Install Chef
        uses: actionshub/chef-install@main
        with:
          channel: stable
          version: latest

      - name: Analyze Docker Image Size
        run: |
          export CHEF_LICENSE=accept-no-persist

          # Create instance and check resource usage
          bundle exec kitchen create default-ubuntu-2204

          # Get Docker image and container info
          CONTAINER_ID=$(docker ps -a --filter "name=default-ubuntu-2204" --format "{{.ID}}")
          IMAGE_SIZE=$(docker images --filter "reference=*ubuntu*" --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}" | grep ubuntu)
          CONTAINER_SIZE=$(docker ps -s --filter "id=$CONTAINER_ID" --format "{{.Size}}")

          echo "Resource Usage Analysis:"
          echo "Docker Images: $IMAGE_SIZE"
          echo "Container Size: $CONTAINER_SIZE"

          # Check memory and CPU usage during converge
          echo "Starting resource monitoring..."
          docker stats $CONTAINER_ID --no-stream > container-stats.txt &

          bundle exec kitchen converge default-ubuntu-2204

          echo "Container Stats:"
          cat container-stats.txt
        env:
          CHEF_LICENSE: accept-no-persist

      - name: Upload Resource Analysis
        uses: actions/upload-artifact@v5
        with:
          name: resource-analysis
          path: |
            container-stats.txt
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          bundle exec kitchen destroy default-ubuntu-2204 || true
