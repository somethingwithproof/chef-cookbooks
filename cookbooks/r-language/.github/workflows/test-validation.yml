name: Test Validation

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel previous runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}



# Minimal permissions by default
permissions:
  contents: read

jobs:
  validate-tests:
    name: Validate Test Coverage
    runs-on: [self-hosted, chef]
    timeout-minutes: 15  # Prevent hung jobs
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Install SimpleCov
        run: gem install simplecov

      - name: Run Tests with Coverage
        run: |
          export CHEF_LICENSE=accept-no-persist
          export COVERAGE=true
          bundle exec rspec --format documentation --format html --out rspec-results.html
        env:
          CHEF_LICENSE: accept-no-persist

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            rspec-results.html
            coverage/
          retention-days: 30

      - name: Validate Kitchen Configuration
        run: |
          export CHEF_LICENSE=accept-no-persist
          bundle exec kitchen diagnose --all > kitchen-diagnose.txt
          bundle exec kitchen list
        env:
          CHEF_LICENSE: accept-no-persist

      - name: Upload Kitchen Diagnostics
        uses: actions/upload-artifact@v7
        with:
          name: kitchen-diagnostics
          path: kitchen-diagnose.txt
          retention-days: 7

  lint-validation:
    name: Extended Linting
    runs-on: [self-hosted, chef]
    timeout-minutes: 15  # Prevent hung jobs
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Install Additional Linters
        run: |
          gem install foodcritic
          gem install reek

      - name: Run Cookstyle with Full Rules
        run: |
          bundle exec cookstyle --display-cop-names --format offenses

      - name: Run Foodcritic
        run: |
          bundle exec foodcritic . --epic-fail any --tags ~FC121

      - name: Run Reek for Code Smells
        run: |
          reek recipes/ libraries/ resources/ || echo "Reek found some code smells"

      - name: Validate Metadata
        run: |
          ruby -c metadata.rb
          echo "Metadata syntax is valid"

      - name: Check File Permissions
        run: |
          find . -name "*.rb" -perm /111 | grep -v bin/ | grep -v scripts/ && echo "Found executable Ruby files" || echo "No executable Ruby files found"
          find . -name "*.yml" -perm /111 && echo "Found executable YAML files" || echo "No executable YAML files found"

  documentation-validation:
    name: Documentation Validation
    runs-on: [self-hosted, chef]
    timeout-minutes: 15  # Prevent hung jobs
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Check README Links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: ".github/mlc_config.json"

      - name: Validate Recipe Documentation
        run: |
          echo "Checking recipe documentation..."
          for recipe in recipes/*.rb; do
            if ! head -10 "$recipe" | grep -q "# Cookbook::"; then
              echo "Missing documentation header in $recipe"
            fi
          done

      - name: Check CHANGELOG Format
        run: |
          if ! grep -q "## \[" CHANGELOG.md; then
            echo "CHANGELOG.md does not follow keep-a-changelog format"
            exit 1
          fi
          echo "CHANGELOG.md format is valid"

      - name: Validate Attributes Documentation
        run: |
          echo "Checking attributes documentation..."
          if [ -f "attributes/default.rb" ]; then
            grep -E "^default\[" attributes/default.rb | while read line; do
              attr_name=$(echo "$line" | sed "s/default\['\([^']*\)'\].*/\1/")
              if ! grep -q "$attr_name" README.md; then
                echo "Attribute $attr_name is not documented in README.md"
              fi
            done
          fi
