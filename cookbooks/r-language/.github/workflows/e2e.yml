name: End-to-End Testing

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6 AM UTC

# Cancel previous runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}



# Minimal permissions by default
permissions:
  contents: read

jobs:
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: [self-hosted, chef]
    timeout-minutes: 15  # Prevent hung jobs
    strategy:
      matrix:
        platform: ["ubuntu-2204", "debian-12"]
        scenario: ["default", "packages"]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Install Chef
        uses: actionshub/chef-install@main
        with:
          channel: stable
          version: latest

      - name: Run E2E Test
        run: |
          export CHEF_LICENSE=accept-no-persist
          # Run kitchen converge and verify, but keep instance for debugging
          bundle exec kitchen create ${{ matrix.scenario }}-${{ matrix.platform }}
          bundle exec kitchen converge ${{ matrix.scenario }}-${{ matrix.platform }}
          bundle exec kitchen verify ${{ matrix.scenario }}-${{ matrix.platform }}
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_YAML: kitchen.yml

      - name: Cleanup
        if: always()
        run: |
          bundle exec kitchen destroy ${{ matrix.scenario }}-${{ matrix.platform }} || true

  e2e-comprehensive:
    name: E2E Comprehensive Tests
    runs-on: [self-hosted, chef]
    timeout-minutes: 15  # Prevent hung jobs
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[e2e-full]')
    strategy:
      matrix:
        platform: ["ubuntu-2204", "ubuntu-2404", "debian-12", "rockylinux-9"]
        scenario: ["default", "source", "packages"]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Install Chef
        uses: actionshub/chef-install@main
        with:
          channel: stable
          version: latest

      - name: Run Full E2E Test
        run: |
          export CHEF_LICENSE=accept-no-persist
          bundle exec kitchen test ${{ matrix.scenario }}-${{ matrix.platform }} --destroy=always
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_YAML: kitchen.yml

  security-scan:
    name: Security Scanning
    runs-on: [self-hosted, chef]
    timeout-minutes: 15  # Prevent hung jobs
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Install bundler-audit
        run: gem install bundler-audit

      - name: Run security audit
        run: |
          bundle audit check --update
          bundle exec cookstyle --format github

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD

  dependency-check:
    name: Dependency Verification
    runs-on: [self-hosted, chef]
    timeout-minutes: 15  # Prevent hung jobs
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Install Chef
        uses: actionshub/chef-install@main
        with:
          channel: stable
          version: latest

      - name: Verify Policyfile
        run: |
          export CHEF_LICENSE=accept-no-persist
          chef install Policyfile.rb
          chef show-policy
        env:
          CHEF_LICENSE: accept-no-persist

      - name: Check for outdated dependencies
        run: |
          bundle outdated --strict || echo "Some gems are outdated"
          chef update Policyfile.rb --dry-run || echo "Policyfile dependencies checked"
