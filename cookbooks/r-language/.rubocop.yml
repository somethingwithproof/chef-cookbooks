# Rubocop configuration for Chef 18.7 cookbooks
inherit_gem:
  cookstyle: config/cookstyle.yml

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.1
  Exclude:
    - "vendor/**/*"
    - "spec/fixtures/**/*"
    - ".kitchen/**/*"
    - "bin/**/*"
    - "berks-cookbooks/**/*"
    - "test/fixtures/**/*"

# Chef specific cops
Chef/Deprecations:
  Enabled: true

Chef/Correctness:
  Enabled: true

Chef/Modernize:
  Enabled: true

Chef/RedundantCode:
  Enabled: true

Chef/Sharing:
  Enabled: true

Chef/Style:
  Enabled: true

# Layout customizations
Layout/LineLength:
  Max: 120
  Exclude:
    - "metadata.rb"

# Metrics customizations
Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "test/**/*"
    - "Policyfile.rb"

Metrics/AbcSize:
  Max: 40

Metrics/MethodLength:
  Max: 40

# Style preferences
Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Style/NumericLiterals:
  Enabled: false

Style/StringLiterals:
  Enabled: true
  EnforcedStyle: single_quotes
