# Rubocop configuration for Chef 18 cookbooks
inherit_gem:
  cookstyle: config/cookstyle.yml

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.1
  Exclude:
    - "vendor/**/*"
    - "spec/fixtures/**/*"
    - ".kitchen/**/*"
    - "bin/**/*"
    - "berks-cookbooks/**/*"

Layout/LineLength:
  Max: 120

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "test/**/*"

Metrics/AbcSize:
  Max: 40

Metrics/MethodLength:
  Max: 40

Style/NumericLiterals:
  Enabled: false

Style/StringLiterals:
  Enabled: true
  EnforcedStyle: single_quotes

# Chef specific cops
Chef/Deprecations:
  Enabled: true

Chef/Correctness:
  Enabled: true

Chef/Modernize:
  Enabled: true
