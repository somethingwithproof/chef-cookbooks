---
driver:
  name: dokken
  chef_version: 18
  privileged: true
  env: [CHEF_LICENSE=accept]

transport:
  name: dokken

provisioner:
  name: dokken
  policyfile_path: Policyfile.rb
  cleanup_on_failure: false
  multiple_converge: 2
  enforce_idempotency: true

verifier:
  name: inspec

platforms:
  - name: ubuntu-20.04
    driver:
      image: dokken/ubuntu-20.04
      pid_one_command: /bin/systemd
  - name: ubuntu-22.04
    driver:
      image: dokken/ubuntu-22.04
      pid_one_command: /bin/systemd
  - name: debian-11
    driver:
      image: dokken/debian-11
      pid_one_command: /bin/systemd
  - name: rockylinux-8
    driver:
      image: dokken/rockylinux-8
      pid_one_command: /bin/systemd
  - name: amazonlinux-2
    driver:
      image: dokken/amazonlinux-2
      pid_one_command: /bin/systemd
  - name: opensuse-leap-15
    driver:
      image: dokken/opensuse-leap-15
      pid_one_command: /bin/systemd

suites:
  - name: default
    run_list:
      - recipe[r-language::default]
    attributes:
      r-language:
        install_method: package
        install_dev: true
        packages: []
    verifier:
      inspec_tests:
        - test/integration/default
        - test/integration/package

  - name: source
    run_list:
      - recipe[r-language::default]
    attributes:
      r-language:
        install_method: source
        version: "4.3.1"
    verifier:
      inspec_tests:
        - test/integration/default
        - test/integration/source

  - name: packages
    run_list:
      - recipe[r-language::default]
    attributes:
      r-language:
        install_method: package
        packages:
          - dplyr
          - ggplot2
    verifier:
      inspec_tests:
        - test/integration/default
        - test/integration/package
        - test/integration/packages
