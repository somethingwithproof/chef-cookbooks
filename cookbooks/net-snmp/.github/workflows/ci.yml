name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel previous runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CHEF_LICENSE: accept-no-persist

jobs:
  lint:
    name: Lint
    runs-on: [self-hosted, chef]
    timeout-minutes: 15
    steps:
      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Ruby
        uses: ruby/setup-ruby@6ca151fd1bfcfd6fe0c4eb6837eb0584d0134a0c
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Run Cookstyle
        run: bundle exec cookstyle

      - name: Validate metadata.rb
        run: bundle exec ruby -c metadata.rb

  unit:
    name: Unit Tests
    needs: lint
    runs-on: [self-hosted, chef]
    timeout-minutes: 15
    strategy:
      matrix:
        chef-version: ['18', '19']
    steps:
      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Ruby
        uses: ruby/setup-ruby@6ca151fd1bfcfd6fe0c4eb6837eb0584d0134a0c
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Run ChefSpec tests
        run: bundle exec rspec --format documentation

  security:
    name: Security Scan
    runs-on: [self-hosted, chef]
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Ruby
        uses: ruby/setup-ruby@6ca151fd1bfcfd6fe0c4eb6837eb0584d0134a0c
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Run bundle-audit
        run: |
          gem install bundler-audit
          bundle-audit check --update

  integration:
    name: Integration Tests
    needs: [unit, security]
    runs-on: [self-hosted, chef]
    timeout-minutes: 45
    strategy:
      matrix:
        os:
          - 'ubuntu-22.04'
          - 'ubuntu-20.04'
          - 'debian-12'
          - 'rockylinux-9'
        suite: ['default', 'snmpv3']
      fail-fast: false
      max-parallel: 4
    steps:
      - name: Check out code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Ruby
        uses: ruby/setup-ruby@6ca151fd1bfcfd6fe0c4eb6837eb0584d0134a0c
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Set up Docker
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349

      - name: Run Test Kitchen
        run: |
          export KITCHEN_YAML=.kitchen.dokken.yml
          bundle exec kitchen test ${{ matrix.suite }}-${{ matrix.os }}
        env:
          CHEF_LICENSE: accept-no-persist

      - name: Upload kitchen logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kitchen-logs-${{ matrix.suite }}-${{ matrix.os }}
          path: .kitchen/logs/
          retention-days: 7
