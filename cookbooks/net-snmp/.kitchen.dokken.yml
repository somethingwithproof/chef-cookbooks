---
driver:
  name: dokken
  privileged: true # because Docker doesn't come with systemd
  chef_version: latest # always use the latest version

provisioner:
  name: dokken
  multiple_converge: 2
  enforce_idempotency: true

transport:
  name: dokken

verifier:
  name: inspec

platforms:
  - name: ubuntu-22.04
    driver:
      image: dokken/ubuntu-22.04
      pid_one_command: /bin/systemd

  - name: ubuntu-24.04
    driver:
      image: dokken/ubuntu-24.04
      pid_one_command: /bin/systemd

  - name: debian-12
    driver:
      image: dokken/debian-12
      pid_one_command: /bin/systemd

  - name: rockylinux-9
    driver:
      image: dokken/rockylinux-9
      pid_one_command: /usr/lib/systemd/systemd

suites:
  - name: default
    run_list:
      - recipe[net-snmp::default]
    verifier:
      inspec_tests:
        - test/integration/default
