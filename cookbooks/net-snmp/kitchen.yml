---
driver:
  name: dokken
  privileged: true
  chef_version: "18"
  chef_license: accept-no-persist

transport:
  name: dokken

provisioner:
  name: dokken
  product_name: cinc
  chef_license: accept-no-persist
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true

verifier:
  name: inspec
  chef_license: accept-no-persist
  sudo: true

platforms:
  - name: ubuntu-20.04
  - name: ubuntu-22.04
  - name: ubuntu-24.04
  - name: debian-11
  - name: debian-12
  - name: rockylinux-8
  - name: rockylinux-9
  - name: almalinux-8
  - name: almalinux-9
  - name: amazonlinux-2023

suites:
  - name: default
    run_list:
      - recipe[net-snmp::default]
    verifier:
      inspec_tests:
        - test/integration/default
    attributes:

  - name: snmpv3
    run_list:
      - recipe[net-snmp::default]
    verifier:
      inspec_tests:
        - test/integration/snmpv3
    attributes:
      net-snmp:
        snmpv3:
          enabled: true
          users:
            - username: snmpv3user
              auth_protocol: SHA
              auth_password: authpass123456
              priv_protocol: AES
              priv_password: privpass123456
