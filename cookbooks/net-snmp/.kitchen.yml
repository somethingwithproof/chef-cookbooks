---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  install_strategy: once
  multiple_converge: 2
  enforce_idempotency: true

verifier:
  name: inspec

platforms:
  - name: ubuntu-22.04
  - name: ubuntu-20.04
  - name: debian-12
  - name: centos-stream-8
  - name: rockylinux-9

suites:
  - name: default
    run_list:
      - recipe[net-snmp::default]
    verifier:
      inspec_tests:
        - test/integration/default
