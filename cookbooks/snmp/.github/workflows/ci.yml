name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: [self-hosted, chef]
    steps:
    - name: Check out code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Install Chef Workstation
      uses: actionshub/chef-install@7bb3b3d73e3495589eac4880759c8eacc8f488e3
      with:
        channel: stable
        project: chef-workstation
    - name: Run Cookstyle
      run: cookstyle .
      env:
        CHEF_LICENSE: accept-no-persist

  unit:
    needs: lint
    runs-on: [self-hosted, chef]
    steps:
    - name: Check out code
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
    - name: Install Chef Workstation
      uses: actionshub/chef-install@7bb3b3d73e3495589eac4880759c8eacc8f488e3
      with:
        channel: stable
        project: chef-workstation
    - name: Unit Tests
      if: always()
      run: chef exec rspec
      env:
        CHEF_LICENSE: accept-no-persist

