name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    - name: Install Chef Workstation
      uses: actionshub/chef-install@main
      with:
        channel: stable
        project: chef-workstation
    - name: Run Cookstyle
      run: cookstyle --auto-correct .
      env:
        CHEF_LICENSE: accept-no-persist

  unit:
    needs: lint
    runs-on: ubuntu-22.04
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    - name: Install Chef Workstation
      uses: actionshub/chef-install@main
      with:
        channel: stable
        project: chef-workstation
    - name: Unit Tests
      if: always()
      run: chef exec rspec
      env:
        CHEF_LICENSE: accept-no-persist

