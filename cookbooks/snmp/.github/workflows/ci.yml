name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: [self-hosted, chef]
    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install Chef Workstation
      uses: actionshub/chef-install@715f6ec56df078a1c7f23df9d1038136c9797b1b
      with:
        channel: stable
        project: chef-workstation
    - name: Run Cookstyle
      run: cookstyle .
      env:
        CHEF_LICENSE: accept-no-persist

  unit:
    needs: lint
    runs-on: [self-hosted, chef]
    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Install Chef Workstation
      uses: actionshub/chef-install@715f6ec56df078a1c7f23df9d1038136c9797b1b
      with:
        channel: stable
        project: chef-workstation
    - name: Unit Tests
      if: always()
      run: chef exec rspec
      env:
        CHEF_LICENSE: accept-no-persist

