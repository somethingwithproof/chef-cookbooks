---
# Primary Docker-based Test Kitchen configuration using Dokken
# Dokken is optimized for Chef cookbook testing in Docker containers
# Perfect for fast, isolated testing on laptops
# For devcontainer development: use .kitchen.devcontainer.yml

driver:
  name: dokken
  privileged: true
  chef_version: latest # Use latest Chef 19
  chef_license: accept-no-persist

transport:
  name: dokken

provisioner:
  name: dokken
  chef_license: accept-no-persist
  multiple_converge: 2
  enforce_idempotency: true
  deprecations_as_errors: true
  log_level: info
  retry_on_exit_code:
    - 35 # Service restart might cause temporary failures
  max_retries: 2
  wait_for_retry: 30

verifier:
  name: inspec

platforms:
  - name: ubuntu-22.04
    driver:
      image: dokken/ubuntu-22.04
      pid_one_command: /bin/systemd
      intermediate_instructions:
        - RUN /usr/bin/apt-get update
        - RUN /usr/bin/apt-get install -y sudo lsb-release

  - name: ubuntu-24.04
    driver:
      image: dokken/ubuntu-24.04
      pid_one_command: /bin/systemd
      intermediate_instructions:
        - RUN /usr/bin/apt-get update
        - RUN /usr/bin/apt-get install -y sudo lsb-release

  - name: debian-12
    driver:
      image: dokken/debian-12
      pid_one_command: /bin/systemd
      intermediate_instructions:
        - RUN /usr/bin/apt-get update
        - RUN /usr/bin/apt-get install -y sudo lsb-release

  - name: rockylinux-9
    driver:
      image: dokken/rockylinux-9
      pid_one_command: /usr/lib/systemd/systemd

  - name: amazonlinux-2023
    driver:
      image: dokken/amazonlinux-2023
      pid_one_command: /usr/lib/systemd/systemd

suites:
  - name: default
    run_list:
      - recipe[cookbook-template::default]
    verifier:
      inspec_tests:
        - test/integration/default
    attributes:
      cookbook_template:
        service:
          port: 8080
          enabled: true